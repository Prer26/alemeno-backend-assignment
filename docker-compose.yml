version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Prerana@123
      POSTGRES_DB: alemeno_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: redis_db

    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: alemeno_backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

    ports:
      - "8000:8000"
  celery:
    build: .
    container_name: celery_worker

    command: celery -A app.tasks worker --pool=solo --loglevel=info

    depends_on:
      - postgres
      - redis

    env_file:
      - .env
volumes:
  postgres_data: